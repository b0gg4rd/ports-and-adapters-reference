name: core
run-name: ${{ github.actor }} launch the workflow for core module
on:
  push:
    paths:
      - 'core/**'
      - '.github/workflows/core.yml'
  pull_request:
    paths:
      - 'core/**'
      - '.github/workflows/core.yml'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: maven

      - name: Test
        run: |
          chmod +x mvnw
          ./mvnw -Djansi.force=true -ntp -U clean test

      - name: Test report (detailed check)
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: 'Unit Tests'
          report-title: 'Unit Test Results'
          path: core/target/surefire-reports/TEST-*.xml
          reporter: java-junit

      - name: JaCoCo coverage report
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: core/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 90
          title: '📊 Code Coverage Report — core'
          update-comment: true

      - name: Generate JaCoCo badges
        if: always() && github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: core/target/site/jacoco/jacoco.csv
          generate-summary: true
          generate-branches-badge: true
          badges-directory: core/.github/badges

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: core/target/site/jacoco/
          retention-days: 30

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: core/target/surefire-reports/
          retention-days: 30

  deploy:
    name: Deploy to GitHub Packages
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: maven

      - name: Deploy
        run: |
          chmod +x mvnw
          ./mvnw -B -Djansi.force=true -ntp -U clean deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
