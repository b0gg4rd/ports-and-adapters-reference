name: undertow-postgresql
run-name: ${{ github.actor }} launch the workflow for undertow-postgresql module
on:
  push:
    paths:
      - 'undertow-postgresql/**'
      - '.github/workflows/undertow-postgresql.yml'
  pull_request:
    paths:
      - 'undertow-postgresql/**'
      - '.github/workflows/undertow-postgresql.yml'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: undertow-postgresql
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '25'
          cache: maven

      - name: Build and functional test
        run: |
          chmod +x mvnw
          ./mvnw -Djansi.force=true -ntp -P functional -U clean verify

      - name: Test report (detailed check)
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: 'Unit Tests'
          report-title: 'Unit Test Results'
          path: undertow-postgresql/target/surefire-reports/TEST-*.xml
          reporter: java-junit

      - name: JaCoCo coverage report
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: undertow-postgresql/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 90
          title: '📊 Code Coverage Report — undertow-postgresql'
          update-comment: true

      - name: Generate JaCoCo badges
        if: always() && github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: undertow-postgresql/target/site/jacoco/jacoco.csv
          generate-summary: true
          generate-branches-badge: true
          badges-directory: undertow-postgresql/.github/badges

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-undertow-postgresql
          path: undertow-postgresql/target/site/jacoco/
          retention-days: 30

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-undertow-postgresql
          path: undertow-postgresql/target/surefire-reports/
          retention-days: 30

  publish:
    name: Build and Push Docker Image
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: undertow-postgresql
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '25'
          cache: maven

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image and Docker image
        run: |
          chmod +x mvnw
          ./mvnw -B -Djansi.force=true -ntp -P prod -U clean package docker:build

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: ./mvnw -B -Djansi.force=true -ntp -P prod docker:push